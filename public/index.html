<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommentVideo</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">CommentVideo</a>
    <div class="navbar-links">
      <a href="/">Home</a>
      <a href="/search.html">Search</a>
      <a href="#" id="auth-link">Login</a>
      <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()"></button>
    </div>
  </nav>

  <main class="container">
    <div class="section-header">
      <h1>Videos</h1>
      <button class="btn btn-primary" id="add-video-btn" style="display:none;">+ Add Video</button>
    </div>

    <div id="add-video-form" class="hidden" style="margin-bottom: 24px;">
      <div class="comment-composer">
        <div class="form-group">
          <label>YouTube URL</label>
          <input type="text" id="video-url" placeholder="https://www.youtube.com/watch?v=...">
        </div>
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="video-title" placeholder="Video title">
        </div>
        <button class="btn btn-primary" onclick="addVideo()">Add Video</button>
      </div>
    </div>

    <div id="video-grid" class="video-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <h3>No videos yet</h3>
      <p>Add a YouTube video to get started.</p>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/utils.js"></script>
  <script>
    initTheme();
    updateNavAuth();

    const HARDCODED_VIDEOS = [
      { id: 'hardcoded-1', youtube_video_id: 'QlFwVjhllzQ', title: 'Video 1' },
      { id: 'hardcoded-2', youtube_video_id: 'bP8ATWCvqzw', title: 'Video 2' },
      { id: 'hardcoded-3', youtube_video_id: 'AVVqU5SG1P8', title: 'Video 3' },
    ];

    const addBtn = document.getElementById('add-video-btn');
    if (isLoggedIn()) {
      addBtn.style.display = 'inline-flex';
    }

    async function loadVideos() {
      const grid = document.getElementById('video-grid');
      const empty = document.getElementById('empty-state');

      let videos = HARDCODED_VIDEOS;

      try {
        const dbVideos = await apiGet('/videos');
        if (dbVideos.length > 0) {
          videos = [...HARDCODED_VIDEOS, ...dbVideos];
        }
      } catch (err) {
        // API not available, use hardcoded only
      }

      if (videos.length === 0) {
        empty.classList.remove('hidden');
        return;
      }

      grid.innerHTML = videos.map(v => `
        <a href="/watch.html?id=${v.id}&yt=${v.youtube_video_id}" class="video-card" style="text-decoration:none;">
          <div class="video-card-thumbnail">
            <img src="${getYouTubeThumbnail(v.youtube_video_id)}" alt="${v.title}">
          </div>
          <div class="video-card-info">
            <div class="video-card-title">${v.title}</div>
            <div class="video-card-meta">${v.created_at ? 'Added ' + formatDate(v.created_at) : 'Hardcoded video'}</div>
          </div>
        </a>
      `).join('');
    }

    async function addVideo() {
      const url = document.getElementById('video-url').value.trim();
      const title = document.getElementById('video-title').value.trim();

      if (!url || !title) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      try {
        await apiPost('/videos', { youtube_url: url, title });
        document.getElementById('video-url').value = '';
        document.getElementById('video-title').value = '';
        document.getElementById('add-video-form').classList.add('hidden');
        showToast('Video added!');
        loadVideos();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    addBtn.addEventListener('click', () => {
      document.getElementById('add-video-form').classList.toggle('hidden');
    });

    loadVideos();
  </script>
</body>
</html>
